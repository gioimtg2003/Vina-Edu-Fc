name: CI/CD Web Pipeline

on:
  push:
    branches:
      - web
  pull_request:
    branches:
      - web

env:
  PROJECT_NAME: 'vinafc-web'

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install
        
      - name: 🧹 Lint Web App
        run: bun run --filter apps/web lint

      - name: 🚀 Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: bun run --filter apps/web deploy:cf

      - name: 📢 Notify Telegram (via Custom Action)
        if: always()
        uses: ./.github/actions/cloudflare-page-telegram-notification
        with:
          account_id: ${{ secrets.CF_ACCOUNT_ID }}
          api_token: ${{ secrets.CF_API_TOKEN }}
          project_name: ${{ env.PROJECT_NAME }}
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          commit_hash: ${{ github.sha }}
