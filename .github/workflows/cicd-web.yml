name: CI/CD Web Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_NAME: 'vinafc-web'

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install
        
      - name: 🧹 Lint Web App
        run: bun run --filter @vinafc/web lint

      - name: 📢 Notify Telegram (via Custom Action)
        if: always()
        uses: ./.github/actions/cloudflare-page-telegram-notification
        with:
          account_id: ${{ secrets.CF_ACCOUNT_ID }}
          api_token: ${{ secrets.CF_API_TOKEN }}
          project_name: "vina-web"
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          commit_hash: ${{ github.sha }}
