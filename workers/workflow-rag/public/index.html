<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VinaUAV — RAG Document Upload</title>
  <meta name="description" content="Upload text documents for RAG processing — chunk, embed, and index into the VinaUAV knowledge base.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0e1a;
      --bg-card: rgba(15, 23, 42, 0.8);
      --bg-glass: rgba(30, 41, 72, 0.45);
      --border-glass: rgba(99, 128, 255, 0.18);
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.35);
      --accent-hover: #818cf8;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --success: #22c55e;
      --error: #ef4444;
      --radius: 16px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(99,102,241,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(56,189,248,0.08) 0%, transparent 60%);
      z-index: -1;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    .container {
      width: 100%;
      max-width: 520px;
      padding: 24px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius);
      padding: 40px 32px;
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(99,128,255,0.06),
        0 8px 32px rgba(0,0,0,0.4),
        0 0 80px -20px var(--accent-glow);
      animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #38bdf8);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-hover));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 20px 0 6px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    /* Drop zone */
    .dropzone {
      border: 2px dashed var(--border-glass);
      border-radius: 12px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .dropzone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(99,102,241,0.04), transparent);
      pointer-events: none;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(99,102,241,0.06);
    }
    .dropzone.dragover {
      transform: scale(1.01);
      box-shadow: 0 0 30px var(--accent-glow);
    }
    .dropzone-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .dropzone:hover .dropzone-icon { opacity: 1; }
    .dropzone-text {
      font-size: 14px;
      color: var(--text-secondary);
    }
    .dropzone-text strong {
      color: var(--accent-hover);
      font-weight: 600;
    }
    .dropzone-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    input[type="file"] { display: none; }

    /* File preview */
    .file-preview {
      display: none;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--bg-glass);
      border-radius: 10px;
      border: 1px solid var(--border-glass);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .file-preview.visible { display: flex; }
    .file-icon { font-size: 24px; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-size {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .file-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .file-remove:hover {
      color: var(--error);
      background: rgba(239,68,68,0.1);
    }

    /* Upload button */
    .btn-upload {
      width: 100%;
      margin-top: 20px;
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      box-shadow: 0 4px 16px var(--accent-glow);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-upload::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.08));
      pointer-events: none;
    }
    .btn-upload:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--accent-glow);
    }
    .btn-upload:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn-upload:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Status toast */
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
      align-items: center;
      gap: 8px;
      animation: slideIn 0.3s ease;
    }
    .status.visible { display: flex; }
    .status.success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      color: var(--success);
    }
    .status.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--error);
    }
    .status.loading {
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      color: var(--accent-hover);
    }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(129,140,248,0.3);
      border-top-color: var(--accent-hover);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <div class="logo-icon">🚁</div>
        <span class="logo-text">VinaUAV</span>
      </div>

      <h1>Upload Document</h1>
      <p class="subtitle">
        Upload a text file to have it chunked, embedded, and indexed into the RAG knowledge base.
      </p>

      <div class="dropzone" id="dropzone">
        <span class="dropzone-icon">📄</span>
        <p class="dropzone-text"><strong>Click to browse</strong> or drag & drop</p>
        <p class="dropzone-hint">Supports .txt files</p>
      </div>
      <input type="file" id="fileInput" accept=".txt,text/plain">

      <div class="file-preview" id="filePreview">
        <span class="file-icon">📎</span>
        <div class="file-info">
          <div class="file-name" id="fileName"></div>
          <div class="file-size" id="fileSize"></div>
        </div>
        <button class="file-remove" id="fileRemove" type="button" title="Remove">&times;</button>
      </div>

      <button class="btn-upload" id="uploadBtn" disabled>Upload & Process</button>

      <div class="status" id="status">
        <span id="statusIcon"></span>
        <span id="statusText"></span>
      </div>
    </div>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreview');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const fileRemove = document.getElementById('fileRemove');
    const uploadBtn = document.getElementById('uploadBtn');
    const status = document.getElementById('status');
    const statusIcon = document.getElementById('statusIcon');
    const statusText = document.getElementById('statusText');

    let selectedFile = null;

    // Format bytes
    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    // Show status message
    function showStatus(type, message) {
      status.className = 'status visible ' + type;
      if (type === 'loading') {
        statusIcon.innerHTML = '<div class="spinner"></div>';
      } else {
        statusIcon.textContent = type === 'success' ? '✅' : '❌';
      }
      statusText.textContent = message;
    }

    function hideStatus() {
      status.className = 'status';
    }

    // Handle file selection
    function handleFile(file) {
      if (!file) return;
      if (!file.name.endsWith('.txt') && file.type !== 'text/plain') {
        showStatus('error', 'Only .txt files are supported.');
        return;
      }
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatBytes(file.size);
      filePreview.classList.add('visible');
      uploadBtn.disabled = false;
      hideStatus();
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = '';
      filePreview.classList.remove('visible');
      uploadBtn.disabled = true;
    }

    // Events
    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
    fileRemove.addEventListener('click', clearFile);

    // Drag & drop
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    // Upload
    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      showStatus('loading', 'Uploading and processing…');

      try {
        const formData = new FormData();
        formData.append('file', selectedFile);

        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Upload failed');
        }

        showStatus('success', `Done! File stored in R2. Workflow "${data.workflowId}" is processing your document.`);
        clearFile();
      } catch (err) {
        showStatus('error', err.message || 'Something went wrong.');
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
